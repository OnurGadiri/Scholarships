<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <title>Giriş</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <nav class="topnav">
    <a href="{% url 'scholarship_list' %}">Kataloq</a>
    <a href="{% url 'register' %}">Qeydiyyat</a>
  </nav>

  <div class="form-wrap">
    <h1>Giriş</h1>

    {% if form.errors %}
      <p class="err">İstifadəçi adı və ya şifrə səhvdir.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}" class="auth-form">
      {% csrf_token %}
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div class="field">
        <label for="id_username">İstifadəçi adı</label>
        {{ form.username }}
      </div>

      <div class="field">
        <label for="id_password">Şifrə</label>
        {{ form.password }}
      </div>

      <button type="submit" class="btn">Daxil ol</button>
    </form>
  </div>
</body>
</html>
